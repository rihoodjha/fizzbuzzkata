name: C# Build and Test

on:
  push:
    paths:
      - "csharp/**"
      - ".github/workflows/csharp-build-test.yml"
  pull_request:
    paths:
      - "csharp/**"
      - ".github/workflows/csharp-build-test.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore csharp/FizzBuzz/FizzBuzz.sln

      - name: Build
        run: dotnet build csharp/FizzBuzz/FizzBuzz.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test csharp/FizzBuzz/FizzBuzz.sln --configuration Release --no-build --verbosity normal
